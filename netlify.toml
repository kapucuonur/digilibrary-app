[build]
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"
  
  VITE_STRIPE_PUBLISHABLE_KEY = "${REACT_APP_STRIPE_PUBLISHABLE_KEY}"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200